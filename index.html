<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1.0"/>
  <meta name="description" content="Abu Tanim (Mr. Tan) — Cybersecurity Researcher & Python Developer."/>
  <title>Mr. Tan — Home</title>
  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
  <link href="https://fonts.googleapis.com/css2?family=Fira+Code:wght@300;400;500;600;700&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet"/>
  <link rel="stylesheet" href="style.css"/>
  <style>
    body { overflow:hidden; }
    @media(max-height:580px){ body{ overflow:auto; } }

    /* ── HOME LAYOUT ── */
    .home {
      position:relative; min-height:100vh;
      display:flex; flex-direction:column;
      align-items:center; justify-content:center;
      padding:5rem var(--sp-10) var(--sp-12);
      overflow:hidden;
    }

    .home__bg {
      position:absolute; inset:0; pointer-events:none;
      background-image:
        linear-gradient(rgba(0,230,57,.018) 1px, transparent 1px),
        linear-gradient(90deg, rgba(0,230,57,.018) 1px, transparent 1px);
      background-size:52px 52px;
      mask-image:radial-gradient(ellipse 75% 65% at center, black 10%, transparent 68%);
      -webkit-mask-image:radial-gradient(ellipse 75% 65% at center, black 10%, transparent 68%);
    }

    .home::after {
      content:''; position:absolute; bottom:0; left:0; right:0;
      height:180px;
      background:linear-gradient(to top, var(--bg-base) 0%, transparent 100%);
      pointer-events:none; z-index:0;
    }

    /* ── TERMINAL WINDOW ── */
    .terminal {
      position:relative; z-index:1;
      width:100%; max-width:800px;
      background:#0d0d10;
      border:1px solid rgba(255,255,255,0.07);
      border-radius:10px;
      box-shadow:
        0 0 0 1px rgba(0,230,57,.04),
        0 40px 100px rgba(0,0,0,.85),
        0 0 140px rgba(0,230,57,.022);
      overflow:hidden;
      display:flex;
      flex-direction:column;
    }

    /* titlebar */
    .t-bar {
      display:flex; align-items:center; gap:12px;
      padding:11px 18px;
      background:#141417;
      border-bottom:1px solid rgba(255,255,255,.055);
      user-select:none; flex-shrink:0;
    }
    .t-dots { display:flex; gap:7px; align-items:center; }
    .dot { width:12px; height:12px; border-radius:50%; }
    .dot-r { background:#ff5f57; }
    .dot-y { background:#febc2e; }
    .dot-g { background:#28c840; }

    .t-title {
      flex:1; text-align:center;
      font-family:'Fira Code', monospace;
      font-size:.7rem; color:#3a3a42;
      letter-spacing:.08em;
    }

    .t-badge {
      font-family:'Fira Code', monospace;
      font-size:.58rem; color:#00e639;
      border:1px solid rgba(0,230,57,.28);
      padding:2px 9px; border-radius:2px;
      letter-spacing:.12em;
      animation:badgePulse 3s ease-in-out infinite alternate;
    }
    @keyframes badgePulse {
      from { opacity:.6; box-shadow: 0 0 4px rgba(0,230,57,.1); }
      to   { opacity:1;  box-shadow: 0 0 12px rgba(0,230,57,.28); }
    }

    /* output body */
    .t-output {
      padding:22px 28px 12px;
      font-family:'Fira Code', monospace;
      font-size:.84rem;
      line-height:1.75;
      color:#00e639;
      overflow-y:auto;
      min-height:260px;
      max-height:52vh;
      /* smooth scrollbar */
      scrollbar-width:thin;
      scrollbar-color:rgba(0,230,57,.15) transparent;
    }
    .t-output::-webkit-scrollbar { width:4px; }
    .t-output::-webkit-scrollbar-track { background:transparent; }
    .t-output::-webkit-scrollbar-thumb { background:rgba(0,230,57,.15); border-radius:4px; }

    /* each output line */
    .t-output > div {
      display:block;
      white-space:pre-wrap;
      word-break:break-word;
      min-height:1.75em;
    }

    /* color tokens */
    .td  { color:#35353d; }   /* dim — box drawing */
    .tw  { color:#f0f0f0; }   /* white */
    .tc  { color:#38bdf8; }   /* cyan */
    .tg  { color:#00e639; }   /* green */
    .twn { color:#f59e0b; }   /* warn */
    .tl  { color:#606068; }   /* label/secondary */

    /* prompt row */
    .t-prompt {
      display:flex; align-items:center; flex-shrink:0;
      padding:10px 28px 14px;
      border-top:1px solid rgba(255,255,255,.045);
      background:#0a0a0d;
      font-family:'Fira Code', monospace;
      font-size:.84rem;
      opacity:0;
      transition:opacity .4s ease;
    }
    .t-prompt.show { opacity:1; }

    .pu { color:#00e639; font-weight:600; }
    .pa { color:#2a2a32; margin:0 1px; }
    .ph { color:#38bdf8; }
    .ps { color:#2a2a32; margin:0 1px; }
    .pd { color:#38bdf8; }
    .pk { color:#505058; margin-left:5px; }

    .t-input {
      flex:1; margin-left:7px;
      background:none; border:none; outline:none;
      font-family:'Fira Code', monospace;
      font-size:.84rem;
      color:#f0f0f0;
      caret-color:#00e639;
      letter-spacing:.02em;
    }

    /* ── NAV PILLS ── */
    .home__pills {
      position:relative; z-index:1;
      display:flex; gap:10px; flex-wrap:wrap;
      justify-content:center; margin-top:22px;
    }
    .pill {
      font-family:'Fira Code', monospace; font-size:.7rem;
      color:#505058; background:#101013;
      border:1px solid rgba(255,255,255,.055);
      padding:5px 16px; border-radius:20px;
      text-decoration:none; letter-spacing:.05em;
      transition:color .12s, border-color .12s, background .12s;
    }
    .pill:hover {
      color:#00e639;
      border-color:rgba(0,230,57,.28);
      background:rgba(0,230,57,.04);
    }

    @media(max-width:640px){
      .home { padding:5rem var(--sp-5) var(--sp-10); }
      .t-output { padding:16px 18px 8px; font-size:.76rem; min-height:220px; }
      .t-prompt  { padding:8px 18px 12px; font-size:.76rem; }
    }
  </style>
</head>
<body>
  <div class="scanlines" aria-hidden="true"></div>

  <!-- NAV -->
  <nav class="nav" id="nav">
    <a href="index.html" class="nav__logo">
      <span class="nav__logo-bracket">[</span>
      <span class="nav__logo-text">Mr.Tan</span>
      <span class="nav__logo-bracket">]</span>
      <span class="nav__logo-cursor">_</span>
    </a>
    <button class="nav__hamburger" id="hamburger" aria-label="Toggle menu" aria-expanded="false">
      <span></span><span></span><span></span>
    </button>
    <ul class="nav__links" id="nav-links">
      <li><a href="about.html"    class="nav__link"><span class="nav__link-prefix">~/</span>about</a></li>
      <li><a href="skills.html"   class="nav__link"><span class="nav__link-prefix">~/</span>skills</a></li>
      <li><a href="projects.html" class="nav__link"><span class="nav__link-prefix">~/</span>projects</a></li>
      <li><a href="contact.html"  class="nav__link nav__link--cta">contact</a></li>
    </ul>
  </nav>

  <!-- HOME -->
  <main class="home">
    <div class="home__bg" aria-hidden="true"></div>

    <div class="terminal">
      <!-- titlebar -->
      <div class="t-bar">
        <div class="t-dots">
          <span class="dot dot-r"></span>
          <span class="dot dot-y"></span>
          <span class="dot dot-g"></span>
        </div>
        <span class="t-title">kali&#x1F311;Mr-Tan:~</span>
        <span class="t-badge">SECURE CONNECTION</span>
      </div>

      <!-- output -->
      <div class="t-output" id="t-output"></div>

      <!-- prompt -->
      <div class="t-prompt" id="t-prompt">
        <span class="pu">kali</span><span class="pa">&#x1F311;</span><span class="ph">Mr-Tan</span><span class="ps">:</span><span class="pd">~</span><span class="pk">$</span>
        <input type="text" class="t-input" id="t-input" autocomplete="off" spellcheck="false" aria-label="terminal input"/>
      </div>
    </div>

    <!-- page nav pills -->
    <div class="home__pills">
      <a href="about.html"    class="pill">~/about</a>
      <a href="skills.html"   class="pill">~/skills</a>
      <a href="projects.html" class="pill">~/projects</a>
      <a href="contact.html"  class="pill">~/contact</a>
    </div>
  </main>

  <script src="terminal.js"></script>
  <script src="nav.js"></script>
</body>
</html>
