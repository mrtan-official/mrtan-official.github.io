<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1.0"/>
  <meta name="description" content="Abu Tanim (Mr. Tan) — Cybersecurity Researcher & Python Developer."/>
  <title>Mr. Tan — Home</title>
  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
  <link href="https://fonts.googleapis.com/css2?family=Fira+Code:wght@300;400;500;600;700&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet"/>
  <link rel="stylesheet" href="style.css"/>
  <style>
    body { overflow:hidden; }
    @media(max-height:580px){ body{ overflow:auto; } }

    .home {
      position:relative; min-height:100vh;
      display:flex; flex-direction:column;
      align-items:center; justify-content:center;
      padding:5rem var(--sp-10) var(--sp-12);
      overflow:hidden;
    }

    .home__bg {
      position:absolute; inset:0; pointer-events:none;
      background-image:
        linear-gradient(rgba(0,230,57,.016) 1px, transparent 1px),
        linear-gradient(90deg, rgba(0,230,57,.016) 1px, transparent 1px);
      background-size:52px 52px;
      mask-image:radial-gradient(ellipse 75% 65% at center, black 10%, transparent 68%);
      -webkit-mask-image:radial-gradient(ellipse 75% 65% at center, black 10%, transparent 68%);
    }

    .home::after {
      content:''; position:absolute; bottom:0; left:0; right:0;
      height:180px;
      background:linear-gradient(to top, var(--bg-base) 0%, transparent 100%);
      pointer-events:none; z-index:0;
    }

    /* ── TERMINAL WINDOW ── */
    .terminal {
      position:relative; z-index:1;
      width:100%; max-width:780px;
      background:#0c0c0e;
      border:1px solid rgba(255,255,255,0.06);
      border-radius:10px;
      box-shadow:
        0 0 0 1px rgba(0,230,57,.03),
        0 40px 100px rgba(0,0,0,.9),
        0 0 120px rgba(0,230,57,.018);
      overflow:hidden;
      display:flex;
      flex-direction:column;
    }

    /* titlebar */
    .t-bar {
      display:flex; align-items:center; gap:10px;
      padding:10px 16px;
      background:#131316;
      border-bottom:1px solid rgba(255,255,255,.05);
      user-select:none; flex-shrink:0;
    }
    .t-dots { display:flex; gap:6px; align-items:center; }
    .dot { width:11px; height:11px; border-radius:50%; }
    .dot-r { background:#ff5f57; }
    .dot-y { background:#febc2e; }
    .dot-g { background:#28c840; }
    .t-title {
      flex:1; text-align:center;
      font-family:'Fira Code', monospace;
      font-size:.68rem; color:#2e2e36;
      letter-spacing:.06em;
    }
    .t-badge {
      font-family:'Fira Code', monospace;
      font-size:.56rem; color:#00e639;
      border:1px solid rgba(0,230,57,.25);
      padding:2px 8px; border-radius:2px;
      letter-spacing:.1em;
      animation:badgePulse 3s ease-in-out infinite alternate;
    }
    @keyframes badgePulse {
      from { opacity:.55; box-shadow:none; }
      to   { opacity:1;   box-shadow:0 0 10px rgba(0,230,57,.25); }
    }

    /* output */
    .t-output {
      padding:18px 24px 8px;
      font-family:'Fira Code', monospace;
      font-size:.82rem;
      line-height:1.55;
      color:#c8c8c8;
      overflow-y:auto;
      min-height:280px;
      max-height:54vh;
      scrollbar-width:thin;
      scrollbar-color:rgba(255,255,255,.07) transparent;
    }
    .t-output::-webkit-scrollbar { width:3px; }
    .t-output::-webkit-scrollbar-thumb { background:rgba(255,255,255,.07); border-radius:3px; }

    /* each line */
    .tline {
      display:block;
      white-space:pre-wrap;
      word-break:break-word;
      min-height:1.55em;
      color:#c8c8c8;
    }

    /* color tokens */
    .tl  { color:#3a3a44; }
    .tw  { color:#e8e8e8; }
    .tc  { color:#38bdf8; }
    .tg  { color:#00e639; }
    .twn { color:#f59e0b; }

    /* prompt */
    .t-prompt {
      display:flex; align-items:center; flex-shrink:0;
      padding:9px 24px 13px;
      border-top:1px solid rgba(255,255,255,.04);
      background:#080809;
      font-family:'Fira Code', monospace;
      font-size:.82rem;
      opacity:0;
      transition:opacity .4s ease;
    }
    .t-prompt.show { opacity:1; }

    .pu { color:#00e639; font-weight:600; }
    .pa { color:#222228; }
    .ph { color:#38bdf8; }
    .ps { color:#222228; }
    .pd { color:#38bdf8; }
    .pk { color:#404048; margin-left:4px; }

    .t-input {
      flex:1; margin-left:6px;
      background:none; border:none; outline:none;
      font-family:'Fira Code', monospace;
      font-size:.82rem;
      color:#e8e8e8;
      caret-color:#00e639;
    }

    /* pills */
    .home__pills {
      position:relative; z-index:1;
      display:flex; gap:8px; flex-wrap:wrap;
      justify-content:center; margin-top:18px;
    }
    .pill {
      font-family:'Fira Code', monospace; font-size:.68rem;
      color:#404048; background:#0c0c0e;
      border:1px solid rgba(255,255,255,.05);
      padding:5px 15px; border-radius:20px;
      text-decoration:none; letter-spacing:.04em;
      transition:color .12s, border-color .12s, background .12s;
    }
    .pill:hover { color:#00e639; border-color:rgba(0,230,57,.25); background:rgba(0,230,57,.03); }

    @media(max-width:640px){
      .home { padding:5rem var(--sp-5) var(--sp-10); }
      .t-output { padding:14px 16px 6px; font-size:.74rem; min-height:240px; }
      .t-prompt  { padding:8px 16px 12px; font-size:.74rem; }
    }
  </style>
</head>
<body>
  <div class="scanlines" aria-hidden="true"></div>

  <nav class="nav" id="nav">
    <a href="index.html" class="nav__logo">
      <span class="nav__logo-bracket">[</span>
      <span class="nav__logo-text">Mr.Tan</span>
      <span class="nav__logo-bracket">]</span>
      <span class="nav__logo-cursor">_</span>
    </a>
    <button class="nav__hamburger" id="hamburger" aria-label="Toggle menu" aria-expanded="false">
      <span></span><span></span><span></span>
    </button>
    <ul class="nav__links" id="nav-links">
      <li><a href="about.html"    class="nav__link"><span class="nav__link-prefix">~/</span>about</a></li>
      <li><a href="skills.html"   class="nav__link"><span class="nav__link-prefix">~/</span>skills</a></li>
      <li><a href="projects.html" class="nav__link"><span class="nav__link-prefix">~/</span>projects</a></li>
      <li><a href="contact.html"  class="nav__link nav__link--cta">contact</a></li>
    </ul>
  </nav>

  <main class="home">
    <div class="home__bg" aria-hidden="true"></div>

    <div class="terminal">
      <div class="t-bar">
        <div class="t-dots">
          <span class="dot dot-r"></span>
          <span class="dot dot-y"></span>
          <span class="dot dot-g"></span>
        </div>
        <span class="t-title">kali@Mr-Tan: ~</span>
        <span class="t-badge">SECURE CONNECTION</span>
      </div>

      <div class="t-output" id="t-output"></div>

      <div class="t-prompt" id="t-prompt">
        <span class="pu">kali</span><span class="pa">@</span><span class="ph">Mr-Tan</span><span class="ps">:</span><span class="pd">~</span><span class="pk">$</span>
        <input type="text" class="t-input" id="t-input" autocomplete="off" spellcheck="false" aria-label="terminal input"/>
      </div>
    </div>

    <div class="home__pills">
      <a href="about.html"    class="pill">~/about</a>
      <a href="skills.html"   class="pill">~/skills</a>
      <a href="projects.html" class="pill">~/projects</a>
      <a href="contact.html"  class="pill">~/contact</a>
    </div>
  </main>

  <script src="terminal.js"></script>
  <script src="nav.js"></script>
</body>
</html>
