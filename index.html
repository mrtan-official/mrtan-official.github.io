<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1.0"/>
  <meta name="description" content="Abu Tanim (Mr. Tan) — Cybersecurity Researcher & Python Developer."/>
  <title>Mr. Tan — Home</title>
  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
  <link href="https://fonts.googleapis.com/css2?family=Fira+Code:wght@300;400;500;600;700&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet"/>
  <link rel="stylesheet" href="style.css"/>
  <style>
    /* ── HOME-ONLY STYLES ── */
    body { overflow:hidden; }
    @media(max-height:600px){ body{ overflow:auto; } }

    .home {
      position:relative; min-height:100vh;
      display:flex; flex-direction:column;
      align-items:center; justify-content:center;
      padding:5rem var(--sp-10) var(--sp-10);
      overflow:hidden;
    }

    .home__bg {
      position:absolute; inset:0; pointer-events:none;
      background-image:
        linear-gradient(rgba(0,230,57,.022) 1px,transparent 1px),
        linear-gradient(90deg,rgba(0,230,57,.022) 1px,transparent 1px);
      background-size:48px 48px;
      mask-image:radial-gradient(ellipse 80% 70% at center,black 15%,transparent 70%);
      -webkit-mask-image:radial-gradient(ellipse 80% 70% at center,black 15%,transparent 70%);
    }

    .home::after {
      content:''; position:absolute; bottom:0; left:0; right:0;
      height:160px; background:linear-gradient(to top,var(--bg-base),transparent);
      pointer-events:none; z-index:0;
    }

    /* Terminal window */
    .terminal {
      position:relative; z-index:1;
      width:100%; max-width:820px;
      background:var(--bg-surface); border:1px solid var(--border);
      border-radius:var(--radius-lg);
      box-shadow:0 0 0 1px rgba(0,230,57,.035),0 32px 80px rgba(0,0,0,.75),0 0 120px rgba(0,230,57,.025);
      overflow:hidden; display:flex; flex-direction:column;
    }

    .terminal__bar {
      display:flex; align-items:center; gap:var(--sp-4);
      padding:.6rem var(--sp-5); background:var(--bg-elevated);
      border-bottom:1px solid var(--border); user-select:none; flex-shrink:0;
    }
    .terminal__dots { display:flex; gap:7px; }
    .dot { width:11px; height:11px; border-radius:50%; }
    .dot--r{background:#ff5f57} .dot--y{background:#febc2e} .dot--g{background:#28c840}
    .terminal__title {
      flex:1; text-align:center; font-family:var(--font-mono);
      font-size:.7rem; color:var(--text-tertiary); letter-spacing:.07em;
    }
    .terminal__badge {
      font-family:var(--font-mono); font-size:.58rem; color:var(--neon);
      border:1px solid rgba(0,230,57,.25); padding:2px 8px; border-radius:2px;
      letter-spacing:.1em; animation:badge-pulse 3.5s ease-in-out infinite alternate;
    }
    @keyframes badge-pulse {
      from{opacity:.65;box-shadow:0 0 5px rgba(0,230,57,.1)}
      to{opacity:1;box-shadow:0 0 14px rgba(0,230,57,.3)}
    }

    .terminal__output {
      padding:var(--sp-6) var(--sp-8); flex:1;
      font-family:var(--font-mono); font-size:.83rem; line-height:2;
      color:var(--neon); overflow-y:auto; min-height:240px; max-height:50vh;
    }
    @media(max-width:640px){ .terminal__output{padding:var(--sp-5) var(--sp-5);font-size:.76rem;min-height:200px;} }

    /* color helpers */
    .t-dim   {color:var(--text-tertiary)}
    .t-white {color:var(--text-primary)}
    .t-cyan  {color:var(--cyber)}
    .t-green {color:var(--neon)}
    .t-warn  {color:#f59e0b}
    .t-label {color:var(--text-secondary)}

    .terminal__prompt-row {
      display:flex; align-items:center; flex-shrink:0;
      padding:.55rem var(--sp-8) var(--sp-5);
      border-top:1px solid var(--border); background:var(--bg-overlay);
      font-family:var(--font-mono); font-size:.83rem; gap:1px;
      opacity:0; transition:opacity var(--ease-slow);
    }
    .terminal__prompt-row.visible { opacity:1; }
    @media(max-width:640px){ .terminal__prompt-row{padding:.5rem var(--sp-5) var(--sp-4);font-size:.76rem;} }

    .p-user{color:var(--neon);font-weight:600}
    .p-at{color:var(--text-tertiary);margin:0 1px}
    .p-host{color:var(--cyber)}
    .p-sep{color:var(--text-tertiary);margin:0 1px}
    .p-dir{color:var(--cyber)}
    .p-dollar{color:var(--text-secondary);margin-left:4px}

    .terminal__input {
      flex:1; margin-left:6px; background:none; border:none; outline:none;
      font-family:var(--font-mono); font-size:.83rem; color:var(--text-primary);
      caret-color:var(--neon); letter-spacing:.02em;
    }
    .terminal__input::placeholder{ color:var(--text-muted); font-style:italic; }

    /* Quick-nav pill buttons below terminal */
    .home__nav-pills {
      position:relative; z-index:1;
      display:flex; gap:var(--sp-3); flex-wrap:wrap; justify-content:center;
      margin-top:var(--sp-6);
    }
    .pill {
      font-family:var(--font-mono); font-size:.72rem;
      color:var(--text-secondary); background:var(--bg-elevated);
      border:1px solid var(--border); padding:6px 16px;
      border-radius:20px; text-decoration:none; letter-spacing:.05em;
      transition:color var(--ease-fast),border-color var(--ease-fast),background var(--ease-fast);
    }
    .pill:hover { color:var(--neon); border-color:rgba(0,230,57,.3); background:rgba(0,230,57,.04); }

    /* Scroll hint */
    .home__hint {
      position:absolute; bottom:var(--sp-6); z-index:1;
      display:flex; flex-direction:column; align-items:center; gap:4px;
      font-family:var(--font-mono); font-size:.62rem;
      color:var(--text-tertiary); letter-spacing:.14em;
    }
    .home__hint span:last-child { color:var(--neon); opacity:.4; animation:bounce 2s ease-in-out infinite; }
    @keyframes bounce{0%,100%{transform:translateY(0);opacity:.4}50%{transform:translateY(5px);opacity:.8}}
  </style>
</head>
<body>
  <div class="scanlines" aria-hidden="true"></div>

      <span class="nav__logo-bracket">[</span>

      <span class="nav__logo-bracket">]</span>

    <ul class="nav__links" id="nav-links">
      <li > <a href="assets/files/mrtan-cv.pdf" download class="pill">~/cv (download) </a> </li>
      <li><a href="about.html"    class="nav__link"><span class="nav__link-prefix">~/</span>about</a></li>
      <li><a href="skills.html"   class="nav__link"><span class="nav__link-prefix">~/</span>skills</a></li>
      <li><a href="projects.html" class="nav__link"><span class="nav__link-prefix">~/</span>projects</a></li>
      <li><a href="contact.html"  class="nav__link nav__link--cta">contact</a></li>

  <!-- HOME TERMINAL -->
  <main class="home" id="home">

    <div class="terminal" role="main">
      <div class="terminal__bar">
        <div class="terminal__dots">
          <span class="dot dot--r"></span>

          <span class="dot dot--g"></span>

        <span class="terminal__title">kali㉿Mr-Tan — ~</span>

      </div>

      <div class="terminal__output" id="terminal-output" aria-live="polite"></div>

      <div class="terminal__prompt-row" id="prompt-row">
        <span class="p-user">kali</span><span class="p-at">㉿</span><span class="p-host">Mr-Tan</span><span class="p-sep">:</span><span class="p-dir">~</span><span class="p-dollar">$</span>
        <input type="text" class="terminal__input" id="terminal-input"
               placeholder="type a command  (try: help)" autocomplete="off" spellcheck="false"/>
      </div>
    </div>

    <div class="home__nav-pills">
      <a href="about.html"    class="pill">~/cv</a>
      <a href="about.html"    class="pill">~/about</a>
      <a href="skills.html"   class="pill">~/skills</a>
      <a href="projects.html" class="pill">~/projects</a>
      <a href="contact.html"  class="pill">~/contact</a>
    </div>

    <div class="home__hint" aria-hidden="true">
      <span>use nav to explore</span>
      <span>▼</span>
    </div>
  </main>

  <script src="terminal.js"></script>
  <script src="nav.js"></script>
</body>
</html>
